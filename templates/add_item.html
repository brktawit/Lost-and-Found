{% extends "base.html" %}

{% block title %}Add Lost Item{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Add Lost Item</h3>
                </div>
                <div class="card-body">
                    
                    {% if success %}
                        <div class="alert alert-success text-center">
                            {{ success }}
                        </div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('items.add_item') }}">
                        <div class="mb-3">
                            <label for="item_name" class="form-label">Item Name:</label>
                            <input type="text" id="item_name" name="item_name" class="form-control" placeholder="Enter item name" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description:</label>
                            <input type="text" id="description" name="description" class="form-control" placeholder="Enter description">
                        </div>

                        <div class="mb-3">
                            <label for="category_id" class="form-label">Category:</label>
                            <select id="category_id" name="category_id" class="form-select" required>
                                {% for category in categories %}
                                    <option value="{{ category.category_id }}">{{ category.category_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Location:</label>
                            <input type="text" id="location" name="location" class="form-control" placeholder="Enter location">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Add Item</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
